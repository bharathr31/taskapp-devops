name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-taskapp
  ACR_NAME: taskappacr
  ACR_LOGIN_SERVER: taskappacr.azurecr.io
  BACKEND_APP: backend
  FRONTEND_APP: frontend
  GATEWAY_APP: gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image backend:${{ github.sha }} \
            ./backend

      - name: Build and push frontend image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image frontend:${{ github.sha }} \
            ./frontend

      - name: Build and push gateway image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image gateway:${{ github.sha }} \
            ./gateway

      - name: Deploy backend
        run: |
          az containerapp update \
            --name $BACKEND_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/backend:${{ github.sha }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name $FRONTEND_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

      - name: Deploy gateway
        run: |
          az containerapp update \
            --name $GATEWAY_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/gateway:${{ github.sha }}
